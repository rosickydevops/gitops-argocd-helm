apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: nginx-app
  namespace: argocd

spec:

  project: default

  source:
    repoURL: https://github.com/rosicky_devops/gitops-argocd-helm
    targetRevision: HEAD
    path: apps/nginx

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

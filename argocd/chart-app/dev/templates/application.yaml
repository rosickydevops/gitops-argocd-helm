apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: {{ .Values.appName }}
  namespace: argocd

spec:

  project: default

  source:
    repoURL: {{ .Values.repoURL }}
    targetRevision: {{ .Values.targetRevision }}
    path: {{ .Values.chartPath }}

    helm:
      valueFiles:
        - {{ .Values.valuesFile }}

  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.namespace }}

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
